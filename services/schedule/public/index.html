<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tech Schedule</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111318;
      color: #e8eaed;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* === HEADER === */
    .header {
      padding: 24px 32px 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    .brand {
      flex-shrink: 0;
    }

    .brand-sub {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .week-label {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .date-label {
      font-size: 16px;
      font-weight: 400;
      color: #9ca3af;
      margin-top: 2px;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-group {
      display: flex;
      border: 1px solid #2d3139;
      border-radius: 8px;
      overflow: hidden;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1c1f26;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #9ca3af;
      transition: all 0.15s;
    }

    .nav-btn:hover { background: #262a33; color: #fff; }
    .nav-btn:first-child { border-right: 1px solid #2d3139; }

    .week-selector {
      padding: 10px 36px 10px 14px;
      border: 1px solid #2d3139;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      color: #e8eaed;
      background: #1c1f26;
      cursor: pointer;
      min-width: 280px;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b7280' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
    }

    .week-selector:focus { outline: none; border-color: #09CBCF; }

    .action-btn {
      padding: 10px 18px;
      border: 1px solid #2d3139;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      background: #1c1f26;
      color: #9ca3af;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .action-btn:hover { border-color: #09CBCF; color: #09CBCF; }

    .action-btn.primary {
      background: #09CBCF;
      color: #111318;
      border-color: #09CBCF;
      font-weight: 700;
    }

    .action-btn.primary:hover { background: #0ae0e4; }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 32px;
      border-bottom: 1px solid #1e2128;
    }

    .data-info {
      font-size: 11px;
      color: #4b5563;
      font-weight: 500;
    }

    /* Auth status styles */
    .auth-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
    }

    .auth-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .auth-dot.ok { background: #10b981; }
    .auth-dot.expired { background: #f59e0b; animation: pulse-dot 1.5s infinite; }
    .auth-dot.checking { background: #6b7280; animation: pulse-dot 1s infinite; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .auth-status .text-ok { color: #10b981; }
    .auth-status .text-expired { color: #f59e0b; }
    .auth-status .text-checking { color: #6b7280; }

    .auth-reauth-btn {
      background: #f59e0b;
      color: #111318;
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .auth-reauth-btn:hover { background: #fbbf24; }

    .auth-synced-msg {
      color: #10b981;
      font-size: 11px;
      font-weight: 600;
      display: none;
    }

    /* === DAY TABS === */
    .day-tabs {
      display: flex;
      padding: 0 32px;
      background: #161920;
      border-bottom: 1px solid #1e2128;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #2d3139 transparent;
    }

    .day-tabs::-webkit-scrollbar { height: 6px; }
    .day-tabs::-webkit-scrollbar-track { background: transparent; }
    .day-tabs::-webkit-scrollbar-thumb { background: #2d3139; border-radius: 3px; }

    .day-tab {
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .day-tab:hover { color: #d1d5db; }

    .day-tab.active {
      color: #09CBCF;
      border-bottom-color: #09CBCF;
    }

    /* === TABLE === */
    .table-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #2d3139 transparent;
    }

    .table-container::-webkit-scrollbar { height: 8px; }
    .table-container::-webkit-scrollbar-track { background: #111318; }
    .table-container::-webkit-scrollbar-thumb { background: #2d3139; border-radius: 4px; }

    .table-wrapper { min-width: 1100px; }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
    }

    .schedule-table thead th {
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #09CBCF;
      text-align: center;
      border-bottom: 1px solid #1e2128;
      background: #161920;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .schedule-table tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1d24;
      vertical-align: top;
      font-size: 14px;
      color: #d1d5db;
      line-height: 1.5;
    }

    .schedule-table tbody tr:hover td {
      background: #1a1d24;
    }

    /* Floor colors */
    .floor-2nd { background: #ea9999 !important; color: #1a1d21 !important; }
    .floor-1st { background: #ffe599 !important; color: #1a1d21 !important; }
    .floor-3rd { background: #a4c2f4 !important; color: #1a1d21 !important; }
    .floor-13th { background: #f4cccc !important; color: #1a1d21 !important; }

    .col-time {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      width: 140px;
      font-variant-numeric: tabular-nums;
    }

    .col-venue {
      font-weight: 700;
      font-size: 15px;
      width: 200px;
    }

    .col-client { width: 200px; }
    .col-contact { width: 150px; color: #9ca3af; }
    .col-event { width: 240px; }

    .col-equipment {
      width: 280px;
      font-size: 12px;
      color: #9ca3af;
      text-align: left;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .col-notes {
      width: 280px;
      font-size: 12px;
      color: #9ca3af;
      text-align: left;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .empty-state {
      padding: 80px 20px;
      text-align: center;
    }

    .empty-state-text {
      font-size: 15px;
      color: #4b5563;
      font-weight: 500;
    }

    .loading {
      padding: 80px 20px;
      text-align: center;
      color: #4b5563;
      font-size: 14px;
      font-weight: 500;
    }

    /* === RESPONSIVE === */
    @media (max-width: 900px) {
      .header { padding: 16px 20px 0; }
      .header-top { flex-direction: column; align-items: flex-start; gap: 16px; }
      .week-label { font-size: 22px; }
      .date-label { font-size: 14px; }
      .meta-row { padding: 10px 20px; flex-wrap: wrap; gap: 8px; }
      .day-tabs { padding: 0 16px; }
      .day-tab { padding: 12px 20px; font-size: 13px; }
      .week-selector { min-width: 220px; font-size: 13px; }
    }

    /* === PRINT === */
    @media print {
      body { background: white; color: #000; }
      .container { max-width: 100%; }
      .controls, .meta-row, .day-tabs { display: none !important; }
      .header { padding: 16px 0; }
      .brand-sub { color: #666; }
      .week-label { color: #000; font-size: 22pt; }
      .date-label { color: #333; font-size: 14pt; }
      .table-container { overflow: visible; }
      .table-wrapper { min-width: 0; }
      .schedule-table thead th {
        background: #e0e0e0 !important; color: #000 !important;
        border: 1px solid #000; font-size: 9pt;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
      .schedule-table tbody td {
        border: 1px solid #999; font-size: 8pt; padding: 6px; color: #000;
      }
      .col-time, .col-venue { font-size: 9pt; }
      .col-equipment, .col-notes { font-size: 7pt; }
      .floor-2nd, .floor-1st, .floor-3rd, .floor-13th {
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
      @page { margin: 1cm; size: landscape; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <div class="brand">
          <div class="brand-sub">Clarion Hotel The Hub</div>
          <div class="week-label" id="weekTitle">Tech Schedule</div>
          <div class="date-label" id="dateTitle"></div>
        </div>
        <div class="controls">
          <div class="nav-group">
            <button class="nav-btn" id="prevWeek" title="Previous week">&#8249;</button>
            <button class="nav-btn" id="nextWeek" title="Next week">&#8250;</button>
          </div>
          <select class="week-selector" id="weekSelect"></select>
          <button class="action-btn primary" id="currentWeek">Today</button>
          <button class="action-btn primary" id="scrapeBtn">Update Data</button>
          <button class="action-btn" id="printBtn">Print</button>
        </div>
      </div>
    </div>

    <div class="meta-row">
      <div class="data-info">Last sync: <span id="dataAsOf">&mdash;</span></div>
      <div class="auth-status" id="authStatus">
        <span class="auth-dot checking" id="authDot"></span>
        <span class="text-checking" id="authText">Checking session...</span>
        <button class="auth-reauth-btn" id="reauthBtn" style="display:none">Re-authenticate</button>
        <span class="auth-synced-msg" id="authSynced">Cookies synced! Verifying...</span>
      </div>
    </div>

    <div class="day-tabs" id="dayTabs"></div>

    <div class="table-container">
      <div id="tableContent" class="loading">Loading schedule...</div>
    </div>
  </div>

<script>
var DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var state = { weeks: [], selectedKey: null, weekData: null, currentDay: 'Monday' };
var authState = { valid: null, polling: false, pollTimer: null };

function fetchJSON(url) {
    return fetch(url).then(function(r) {
        if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
        return r.json();
    });
}

// === AUTH STATUS ===

function checkAuth() {
    var dot = document.getElementById('authDot');
    var text = document.getElementById('authText');
    var btn = document.getElementById('reauthBtn');
    var synced = document.getElementById('authSynced');

    dot.className = 'auth-dot checking';
    text.className = 'text-checking';
    text.textContent = 'Checking session...';

    fetchJSON('/api/auth/check')
    .then(function(result) {
        authState.valid = result.valid;
        if (result.valid) {
            dot.className = 'auth-dot ok';
            text.className = 'text-ok';
            text.textContent = 'EventTemple connected';
            btn.style.display = 'none';
            synced.style.display = 'none';
            // If we were polling after reauth, stop and offer to scrape
            if (authState.polling) {
                stopAuthPolling();
                synced.style.display = 'inline';
                synced.textContent = 'Session restored!';
                setTimeout(function() { synced.style.display = 'none'; }, 5000);
                // Auto-trigger a scrape since we just re-authenticated
                document.getElementById('scrapeBtn').click();
            }
        } else {
            dot.className = 'auth-dot expired';
            text.className = 'text-expired';
            text.textContent = 'Session expired';
            btn.style.display = 'inline-block';
        }
    })
    .catch(function(e) {
        dot.className = 'auth-dot expired';
        text.className = 'text-expired';
        text.textContent = 'Auth check failed';
        btn.style.display = 'inline-block';
    });
}

function startAuthPolling() {
    authState.polling = true;
    authState.pollTimer = setInterval(checkAuth, 5000);
}

function stopAuthPolling() {
    authState.polling = false;
    if (authState.pollTimer) {
        clearInterval(authState.pollTimer);
        authState.pollTimer = null;
    }
}

function handleReauth() {
    var btn = document.getElementById('reauthBtn');
    var synced = document.getElementById('authSynced');

    // Open EventTemple — extension will grab cookies on successful login
    window.open('https://app.eventtemple.com/event_spaces/list', '_blank');

    btn.style.display = 'none';
    synced.style.display = 'inline';
    synced.textContent = 'Waiting for extension to sync cookies...';

    // Poll for new valid auth
    startAuthPolling();

    // Stop polling after 5 minutes if nothing happens
    setTimeout(function() {
        if (authState.polling && !authState.valid) {
            stopAuthPolling();
            synced.textContent = 'Timed out. Try again?';
            btn.style.display = 'inline-block';
            setTimeout(function() { synced.style.display = 'none'; }, 3000);
        }
    }, 300000);
}

// === SCHEDULE DATA ===

function init() {
    Promise.all([fetchJSON('/api/weeks'), fetchJSON('/api/status')])
    .then(function(results) {
        var weeks = results[0], status = results[1];
        state.weeks = weeks;
        document.getElementById('dataAsOf').textContent = status.dataAsOf || '\u2014';

        var today = new Date();
        var d = today.getDay();
        var diff = d === 0 ? -6 : 1 - d;
        var mon = new Date(today); mon.setDate(today.getDate() + diff);
        var currentKey = mon.getFullYear() + '-' + String(mon.getMonth()+1).padStart(2,'0') + '-' + String(mon.getDate()).padStart(2,'0');

        state.selectedKey = weeks.find(function(w){return w.key===currentKey;}) ? currentKey : (weeks.length ? weeks[weeks.length-1].key : null);

        var todayName = today.toLocaleDateString('en-US', { weekday: 'long' });
        if (DAYS.indexOf(todayName) >= 0) state.currentDay = todayName;

        if (state.selectedKey) return loadWeek(state.selectedKey);
    })
    .then(function() { renderWeekSelector(); })
    .catch(function(e) {
        document.getElementById('tableContent').innerHTML = '<div class="empty-state"><div class="empty-state-text">Failed to load: ' + e.message + '</div></div>';
    });
}

function loadWeek(key) {
    state.selectedKey = key;
    document.getElementById('tableContent').innerHTML = '<div class="loading">Loading...</div>';
    return fetchJSON('/api/week/' + key).then(function(data) {
        state.weekData = data;
        renderAll();
    }).catch(function(e) {
        document.getElementById('tableContent').innerHTML = '<div class="empty-state"><div class="empty-state-text">' + e.message + '</div></div>';
    });
}

function renderAll() { renderHeader(); renderDayTabs(); renderTable(); }

function renderWeekSelector() {
    var sel = document.getElementById('weekSelect');
    sel.innerHTML = state.weeks.map(function(w) {
        return '<option value="' + w.key + '"' + (w.key === state.selectedKey ? ' selected' : '') + '>' + w.label + '</option>';
    }).join('');
}

function renderHeader() {
    document.getElementById('weekTitle').textContent = state.weekData ? state.weekData.weekLabel : 'Tech Schedule';
    var dayData = state.weekData && state.weekData.days[state.currentDay];
    document.getElementById('dateTitle').textContent = dayData ? dayData.date : '';
}

function renderDayTabs() {
    var tabs = document.getElementById('dayTabs');
    tabs.innerHTML = DAYS.map(function(day) {
        var active = day === state.currentDay ? ' active' : '';
        return '<button class="day-tab' + active + '" data-day="' + day + '">' + day + '</button>';
    }).join('');
    tabs.querySelectorAll('.day-tab').forEach(function(t) {
        t.addEventListener('click', function(e) {
            e.preventDefault();
            state.currentDay = this.dataset.day;
            renderAll();
        });
    });
}

function esc(text) {
    if (!text) return '';
    var d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function renderTable() {
    var el = document.getElementById('tableContent');
    var dayData = state.weekData && state.weekData.days[state.currentDay];
    if (!dayData || !dayData.events || dayData.events.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="empty-state-text">No events on ' + state.currentDay + '</div></div>';
        return;
    }
    var rows = dayData.events.map(function(e) {
        var fc = e.floor ? 'floor-' + e.floor : '';
        return '<tr>' +
            '<td class="col-time ' + fc + '">' + esc(e.time) + '</td>' +
            '<td class="col-venue ' + fc + '">' + esc(e.venue) + '</td>' +
            '<td class="col-client">' + esc(e.client) + '</td>' +
            '<td class="col-contact">' + esc(e.contact) + '</td>' +
            '<td class="col-event">' + esc(e.event) + '</td>' +
            '<td class="col-equipment">' + esc(e.equipment) + '</td>' +
            '<td class="col-notes">' + esc(e.notes) + '</td>' +
            '</tr>';
    }).join('');
    el.innerHTML = '<div class="table-wrapper"><table class="schedule-table">' +
        '<thead><tr><th>Time</th><th>Venue</th><th>Client</th><th>Contact</th><th>Event</th><th>Equipment</th><th>Notes</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table></div>';
}

// === EVENT LISTENERS ===

document.getElementById('weekSelect').addEventListener('change', function(e) { loadWeek(e.target.value); renderWeekSelector(); });
document.getElementById('prevWeek').addEventListener('click', function() {
    var i = state.weeks.findIndex(function(w) { return w.key === state.selectedKey; });
    if (i > 0) { loadWeek(state.weeks[i-1].key).then(renderWeekSelector); }
});
document.getElementById('nextWeek').addEventListener('click', function() {
    var i = state.weeks.findIndex(function(w) { return w.key === state.selectedKey; });
    if (i < state.weeks.length - 1) { loadWeek(state.weeks[i+1].key).then(renderWeekSelector); }
});
document.getElementById('currentWeek').addEventListener('click', function() {
    var today = new Date();
    var d = today.getDay();
    var diff = d === 0 ? -6 : 1 - d;
    var mon = new Date(today); mon.setDate(today.getDate() + diff);
    var key = mon.getFullYear() + '-' + String(mon.getMonth()+1).padStart(2,'0') + '-' + String(mon.getDate()).padStart(2,'0');
    var todayName = today.toLocaleDateString('en-US', { weekday: 'long' });
    if (DAYS.indexOf(todayName) >= 0) state.currentDay = todayName;
    if (state.weeks.find(function(w) { return w.key === key; })) { loadWeek(key).then(renderWeekSelector); }
});
document.getElementById('printBtn').addEventListener('click', function() { window.print(); });
document.getElementById('reauthBtn').addEventListener('click', handleReauth);

document.getElementById('scrapeBtn').addEventListener('click', function() {
    var btn = this;
    btn.disabled = true;
    btn.textContent = 'Updating...';
    fetch('/api/scrape', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.ok) {
            btn.textContent = 'Scraping...';
            var poll = setInterval(function() {
                fetch('/api/scrape/status').then(function(r) { return r.json(); })
                .then(function(s) {
                    if (!s.running) {
                        clearInterval(poll);
                        btn.disabled = false;
                        btn.textContent = 'Update Data';
                        if (s.last_result === 'success') {
                            init();
                            checkAuth();
                        } else {
                            checkAuth(); // May have failed due to expired session
                        }
                    }
                }).catch(function() { clearInterval(poll); btn.disabled = false; btn.textContent = 'Update Data'; });
            }, 3000);
        } else {
            btn.textContent = data.error || 'Failed';
            setTimeout(function() { btn.disabled = false; btn.textContent = 'Update Data'; }, 3000);
        }
    })
    .catch(function(e) {
        btn.textContent = 'Error';
        setTimeout(function() { btn.disabled = false; btn.textContent = 'Update Data'; }, 3000);
    });
});

// === STARTUP ===
init();
checkAuth();

// Reload data at 05:05 and 13:05 (just after auto-scrape)
(function() {
    function msUntil(hour, min) {
        var now = new Date();
        var target = new Date(now);
        target.setHours(hour, min, 0, 0);
        if (target <= now) target.setDate(target.getDate() + 1);
        return target - now;
    }
    function scheduleReload(hour, min) {
        setTimeout(function() {
            init();
            checkAuth();
            scheduleReload(hour, min);
        }, msUntil(hour, min));
    }
    scheduleReload(5, 5);
    scheduleReload(13, 5);
})();
</script>
</body>
</html>
