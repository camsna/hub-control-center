<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Light Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e; color: #eee;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 20px;
  }
  h1 { font-size: 1.4em; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; font-size: 0.9em; margin-bottom: 24px; }

  .room-tabs {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .room-tab {
    padding: 10px 24px; border-radius: 8px; border: 2px solid #333;
    background: #222; color: #aaa; font-size: 1em; cursor: pointer;
    transition: all 0.2s;
  }
  .room-tab.active { border-color: #4dabf7; color: #fff; background: #1a3a5c; }
  .room-tab:hover:not(.active) { border-color: #555; }

  .status-bar {
    background: #222; border-radius: 8px; padding: 12px 20px;
    margin-bottom: 20px; text-align: center; font-size: 1.1em;
    min-width: 320px; border: 1px solid #333;
  }
  .status-bar .channel-num { color: #ffd43b; font-weight: bold; font-size: 1.4em; }
  .status-bar .state-on { color: #51cf66; }
  .status-bar .state-off { color: #ff6b6b; font-weight: bold; }

  .controls {
    display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
  }
  .nav-btn {
    width: 56px; height: 56px; border-radius: 50%; border: 2px solid #4dabf7;
    background: #1a3a5c; color: #4dabf7; font-size: 1.6em; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; user-select: none;
  }
  .nav-btn:hover { background: #4dabf7; color: #fff; }
  .nav-btn:active { transform: scale(0.95); }

  .slider-container { flex: 1; max-width: 400px; }
  .slider-container input[type="range"] {
    width: 100%; height: 8px; -webkit-appearance: none; appearance: none;
    background: #333; border-radius: 4px; outline: none;
  }
  .slider-container input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
    background: #4dabf7; cursor: pointer;
  }

  .grid {
    display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px;
    max-width: 600px; width: 100%; margin-bottom: 20px;
  }
  .cell {
    aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center;
    justify-content: center; font-size: 0.75em; font-weight: 600;
    cursor: pointer; transition: all 0.15s; user-select: none;
    border: 2px solid transparent;
  }
  .cell.on { background: #2b8a3e; color: #fff; }
  .cell.off { background: #c92a2a; color: #fff; border-color: #ff6b6b; }
  .cell.current { border-color: #ffd43b; box-shadow: 0 0 8px rgba(255, 212, 59, 0.5); }
  .cell.marked { position: relative; }
  .cell.marked::after {
    content: '★'; position: absolute; top: -2px; right: 1px;
    font-size: 0.7em; color: #ffd43b;
  }

  .action-bar {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
  }
  .action-btn {
    padding: 8px 16px; border-radius: 6px; border: 1px solid #555;
    background: #333; color: #ddd; cursor: pointer; font-size: 0.85em;
    transition: all 0.15s;
  }
  .action-btn:hover { background: #444; }
  .action-btn.danger { border-color: #c92a2a; color: #ff6b6b; }
  .action-btn.danger:hover { background: #c92a2a; color: #fff; }
  .action-btn.primary { border-color: #4dabf7; color: #4dabf7; }
  .action-btn.primary:hover { background: #4dabf7; color: #fff; }
  .action-btn.success { border-color: #51cf66; color: #51cf66; }
  .action-btn.success:hover { background: #2b8a3e; color: #fff; }

  .marked-list {
    background: #222; border-radius: 8px; padding: 16px; max-width: 600px;
    width: 100%; border: 1px solid #333;
  }
  .marked-list h3 { color: #ffd43b; margin-bottom: 8px; font-size: 0.95em; }
  .marked-list .channels { color: #ccc; font-family: monospace; font-size: 0.95em; }
  .marked-list .empty { color: #666; font-style: italic; }

  .connection {
    position: fixed; top: 8px; right: 12px; font-size: 0.75em;
    padding: 4px 10px; border-radius: 12px; background: #222; border: 1px solid #333;
  }
  .connection.ok { color: #51cf66; border-color: #2b8a3e; }
  .connection.err { color: #ff6b6b; border-color: #c92a2a; }

  .keyboard-hint {
    color: #666; font-size: 0.75em; margin-top: 8px; text-align: center;
  }
</style>
</head>
<body>

<h1>Screen Light Finder</h1>
<p class="subtitle">All taklys ON — scroll to turn one OFF and find it</p>

<div class="room-tabs">
  <button class="room-tab active" data-universe="6">Sal A (U6)</button>
  <button class="room-tab" data-universe="7">Sal B (U7)</button>
  <button class="room-tab" data-universe="8">Sal C (U8)</button>
</div>

<div class="status-bar">
  Channel <span class="channel-num" id="currentChannel">1</span>
  is <span class="state-off" id="currentState">OFF</span>
</div>

<div class="controls">
  <button class="nav-btn" id="prevBtn">◀</button>
  <div class="slider-container">
    <input type="range" id="channelSlider" min="1" max="72" value="1">
  </div>
  <button class="nav-btn" id="nextBtn">▶</button>
</div>

<div class="grid" id="grid"></div>

<div class="action-bar">
  <button class="action-btn primary" id="markBtn">★ Mark as Screen Light</button>
  <button class="action-btn" id="allOnBtn">All ON</button>
  <button class="action-btn danger" id="allOffBtn">All OFF</button>
  <button class="action-btn success" id="copyBtn">Copy Results</button>
</div>

<div class="marked-list">
  <h3>Marked Screen Lights</h3>
  <div id="markedSalA" style="margin-bottom:4px"><strong>Sal A (U6):</strong> <span class="channels empty">none yet</span></div>
  <div id="markedSalB" style="margin-bottom:4px"><strong>Sal B (U7):</strong> <span class="channels empty">none yet</span></div>
  <div id="markedSalC"><strong>Sal C (U8):</strong> <span class="channels empty">none yet</span></div>
</div>

<p class="keyboard-hint">← → arrow keys to navigate &nbsp;|&nbsp; Space to mark &nbsp;|&nbsp; 1/2/3 to switch rooms</p>

<div class="connection" id="connStatus">connecting...</div>

<script>
const API = window.location.origin;
const PRIORITY = 190;   // Higher than house presets (100), below panic (200)
const DURATION = 30000;  // 30s hold - refreshed on every change
const TAKLYS_COUNT = 72;

let currentUniverse = 6;
let currentChannel = 1;

// Marked screen lights per universe
const marked = { 6: new Set(), 7: new Set(), 8: new Set() };

// --- DOM ---
const grid = document.getElementById('grid');
const slider = document.getElementById('channelSlider');
const channelDisplay = document.getElementById('currentChannel');
const stateDisplay = document.getElementById('currentState');

// Build grid cells
for (let i = 1; i <= TAKLYS_COUNT; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell on';
  cell.textContent = i;
  cell.dataset.channel = i;
  cell.addEventListener('click', () => goToChannel(i));
  grid.appendChild(cell);
}

// --- Room tabs ---
document.querySelectorAll('.room-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelector('.room-tab.active').classList.remove('active');
    tab.classList.add('active');
    currentUniverse = parseInt(tab.dataset.universe);
    // Keep current channel position, just switch universe
    sendState();
    updateUI();
  });
});

// --- Navigation ---
function goToChannel(ch) {
  currentChannel = Math.max(1, Math.min(TAKLYS_COUNT, ch));
  slider.value = currentChannel;
  sendState();
  updateUI();
}

document.getElementById('prevBtn').addEventListener('click', () => goToChannel(currentChannel - 1));
document.getElementById('nextBtn').addEventListener('click', () => goToChannel(currentChannel + 1));
slider.addEventListener('input', () => goToChannel(parseInt(slider.value)));

// --- Mark / Actions ---
document.getElementById('markBtn').addEventListener('click', toggleMark);
document.getElementById('allOnBtn').addEventListener('click', () => { sendAllOn(); });
document.getElementById('allOffBtn').addEventListener('click', () => { sendAllOff(); });
document.getElementById('copyBtn').addEventListener('click', copyResults);

function toggleMark() {
  const set = marked[currentUniverse];
  if (set.has(currentChannel)) {
    set.delete(currentChannel);
  } else {
    set.add(currentChannel);
  }
  updateUI();
}

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); goToChannel(currentChannel - 1); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); goToChannel(currentChannel + 1); }
  else if (e.key === ' ') { e.preventDefault(); toggleMark(); }
  else if (e.key === '1') document.querySelector('[data-universe="6"]').click();
  else if (e.key === '2') document.querySelector('[data-universe="7"]').click();
  else if (e.key === '3') document.querySelector('[data-universe="8"]').click();
});

// --- DMX Communication ---
async function sendState() {
  // All channels at 255 except the current one at 0
  const channels = {};
  for (let i = 1; i <= TAKLYS_COUNT; i++) {
    channels[i] = (i === currentChannel) ? 0 : 255;
  }

  try {
    const resp = await fetch(API + '/channels', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        [currentUniverse]: channels,
        priority: PRIORITY,
        duration: DURATION
      })
    });
    const data = await resp.json();
    setConnStatus(data.ok);
  } catch (err) {
    console.error('DMX send failed:', err);
    setConnStatus(false);
  }
}

async function sendAllOn() {
  const channels = {};
  for (let i = 1; i <= TAKLYS_COUNT; i++) channels[i] = 255;

  try {
    await fetch(API + '/channels', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        [currentUniverse]: channels,
        priority: PRIORITY,
        duration: DURATION
      })
    });
  } catch (err) { console.error(err); }
}

async function sendAllOff() {
  const channels = {};
  for (let i = 1; i <= TAKLYS_COUNT; i++) channels[i] = 0;

  try {
    await fetch(API + '/channels', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        [currentUniverse]: channels,
        priority: PRIORITY,
        duration: DURATION
      })
    });
  } catch (err) { console.error(err); }
}

// --- UI Updates ---
function updateUI() {
  channelDisplay.textContent = currentChannel;

  // Update grid
  grid.querySelectorAll('.cell').forEach(cell => {
    const ch = parseInt(cell.dataset.channel);
    const isCurrent = ch === currentChannel;
    cell.className = 'cell ' +
      (isCurrent ? 'off current' : 'on') +
      (marked[currentUniverse].has(ch) ? ' marked' : '');
  });

  // Update marked lists
  updateMarkedList('markedSalA', 6);
  updateMarkedList('markedSalB', 7);
  updateMarkedList('markedSalC', 8);
}

function updateMarkedList(elemId, universe) {
  const span = document.getElementById(elemId).querySelector('.channels');
  const sorted = [...marked[universe]].sort((a, b) => a - b);
  if (sorted.length === 0) {
    span.className = 'channels empty';
    span.textContent = 'none yet';
  } else {
    span.className = 'channels';
    span.textContent = sorted.join(', ');
  }
}

function setConnStatus(ok) {
  const el = document.getElementById('connStatus');
  el.textContent = ok ? 'connected' : 'disconnected';
  el.className = 'connection ' + (ok ? 'ok' : 'err');
}

function copyResults() {
  const lines = [];
  [6, 7, 8].forEach(u => {
    const sorted = [...marked[u]].sort((a, b) => a - b);
    const room = u === 6 ? 'Sal A' : u === 7 ? 'Sal B' : 'Sal C';
    lines.push(`${room} (U${u}): [${sorted.join(', ')}]`);
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Results', 1500);
  });
}

// --- Init ---
// Check connection on load
fetch(API + '/status')
  .then(r => r.json())
  .then(() => { setConnStatus(true); sendState(); updateUI(); })
  .catch(() => setConnStatus(false));

updateUI();
</script>
</body>
</html>
