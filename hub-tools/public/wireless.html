        .freq-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

        .floor-2f-box h3 { color: #1e3a5f; font-size: 11px; font-weight: 700; margin-bottom: 4px; }
        .floor-2f-box .transmitters { display: flex; gap: 6px; }
        .floor-2f-box .tx { flex: 1; }
        .floor-2f-box .tx-label { font-size: 9px; font-weight: 700; color: #1e293b; }

            .floor-badge { background: #4a9eff; }
            .section-header { background: #1a1a25; color: #4a9eff; border: 1px solid #2a2a38; }

            .cart-box { border-color: #2a2a38; }

            .cart-1 { background: rgba(59, 130, 246, 0.1); } .cart-2 { background: rgba(34, 197, 94, 0.1); }
            .cart-3 { background: rgba(234, 179, 8, 0.1); } .cart-4 { background: rgba(236, 72, 153, 0.1); }
            .cart-5 { background: rgba(99, 102, 241, 0.1); } .cart-6 { background: rgba(20, 184, 166, 0.1); }
            .cart-7 { background: rgba(251, 146, 60, 0.1); } .cart-midas { background: rgba(139, 92, 246, 0.1); }
            .info-box { border-color: #2a2a38; }

            .info-row .freq { color: #8888a0; }
            .band-box { border-color: #2a2a38; }
            .band-box.blue { background: rgba(74, 158, 255, 0.08); border-color: rgba(74, 158, 255, 0.3); }

            .band-box.teal h4 { color: #34c759; }

</head>
<body>
    <div class="page">
        <div class="tab-buttons no-print">
            <button class="tab-btn active" onclick="showTab(this,'detailed')">1F Detailed</button>
            <button class="tab-btn" onclick="showTab(this,'quick')">1F Quick Ref</button>
            <button class="tab-btn" onclick="showTab(this,'detailed2f')">2F Detailed</button>
            <button class="tab-btn" onclick="showTab(this,'quick2f')">2F Quick Ref</button>
            <button class="print-btn no-print" onclick="window.print()">Print / Save PDF</button>
        </div>
        <div id="detailed" class="tab-content active"><div class="loading">Loading frequency data from spreadsheet...</div></div>
        <div id="quick" class="tab-content"></div>
        <div id="detailed2f" class="tab-content"></div>
        <div id="quick2f" class="tab-content"></div>
    </div>

<script>
const SHEET_ID = '1KdgC9K7lldoBfUJrgzN8ZoXmkuLcGFPlxQAeUsbxZdw';
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;

function fetchSheet(name) {
    return fetch(BASE + encodeURIComponent(name))
        .then(r => r.text())
        .then(t => JSON.parse(t.replace(/^[^{]*/, '').replace(/[^}]*$/, '')));
}

function val(cell) { return cell ? cell.v : null; }
function fval(cell) { return cell && cell.f ? cell.f : (cell && cell.v != null ? parseFloat(cell.v).toFixed(3) : null); }
function fmt(n) { return parseFloat(n).toFixed(3); }

function parse1F(json) {
    const rows = json.table.rows;
    const result = { carts: {}, portableRacks: [], techRoom: [] };
    let section = 'carts';

    for (const row of rows) {
        const c = row.c;
        const a = val(c[0]);
        if (!a) continue;

        if (a.includes('PORTABLE RACKS')) { section = 'portable'; continue; }
        if (a.includes('TECH ROOM')) { section = 'tech'; continue; }
        if (a === 'Location' || a === 'Group') continue;

        if (section === 'carts') {
            const freq = fval(c[2]);
            if (!freq) continue;
            const txNum = c[1] ? c[1].f || String(Math.round(c[1].v)) : null;
            let txLabel; if (a === 'Midas Cart') { if (!result.carts[a]) result.carts[a] = []; txLabel = 'TX M' + (result.carts[a].length + 1); } else { txLabel = txNum ? 'TX ' + txNum : 'TX'; }
            if (!result.carts[a]) result.carts[a] = [];
            result.carts[a].push({ tx: txLabel, freq: freq });
        } else if (section === 'portable') {
            const freq = fval(c[1]);
            if (freq) result.portableRacks.push({ name: a, freq: freq });
        } else if (section === 'tech') {
            const freq = fval(c[1]);
            if (freq) result.techRoom.push({ name: a, freq: freq });
        }
    }
    return result;
}

function parse2F(json) {
    const rows = json.table.rows;
    const result = { groups: {} };
    for (const row of rows) {
        const c = row.c;
        const group = val(c[0]);
        const freq = fval(c[2]);
        if (!group || !freq) continue;
        const txNum = c[1] ? Math.round(c[1].v) : null;
        if (!txNum) continue;
        if (!result.groups[group]) result.groups[group] = [];
        result.groups[group].push({ tx: 'TX ' + txNum, freq: freq });
    }
    return result;
}

function deriveQuickRef1F(f1) {
    const ewd = [], g4 = [];
    for (const c in f1.carts) f1.carts[c].forEach(t => ewd.push(parseFloat(t.freq)));
    f1.portableRacks.forEach(r => g4.push(parseFloat(r.freq)));
    f1.techRoom.forEach(t => g4.push(parseFloat(t.freq)));
    ewd.sort((a,b)=>a-b); g4.sort((a,b)=>a-b);
    return { ewd: ewd.map(fmt), g4: g4.map(fmt) };
}

function deriveQuickRef2F(f2) {
    const freqs = [];
    for (const g in f2.groups) f2.groups[g].forEach(t => freqs.push(parseFloat(t.freq)));
    freqs.sort((a,b)=>a-b);
    return freqs.map(fmt);
}

function calcBands(f1, f2) {
    const cF=[], rF=[], tF=[], f2F=[];
    for (const c in f1.carts) f1.carts[c].forEach(t => cF.push(parseFloat(t.freq)));
    f1.portableRacks.forEach(r => rF.push(parseFloat(r.freq)));
    f1.techRoom.forEach(t => tF.push(parseFloat(t.freq)));
    for (const g in f2.groups) f2.groups[g].forEach(t => f2F.push(parseFloat(t.freq)));
    const rng = a => ({ min:fmt(Math.min(...a)), max:fmt(Math.max(...a)), count:a.length });
    return { carts:rng(cF), portableRacks:rng(rF), techRoom:rng(tF), floor2:rng(f2F) };
}

const cartColors = {'Cart 1':'cart-1','Cart 2':'cart-2','Cart 3':'cart-3','Cart 4':'cart-4','Cart 5':'cart-5','Cart 6':'cart-6','Cart 7':'cart-7','Midas Cart':'cart-midas midas'};
const cartOrder = ['Cart 1','Cart 2','Cart 3','Cart 4','Cart 5','Cart 6','Cart 7','Midas Cart'];
const groupOrder = ['TX 1\u20134','TX 5\u20138','TX 9\u201312','TX 13\u201316','TX 17\u201320','TX 21\u201324','TX 25\u201328'];

function render(f1, f2) {
    const qr1 = deriveQuickRef1F(f1);
    const qr2 = deriveQuickRef2F(f2);
    const br = calcBands(f1, f2);
    const now = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    document.getElementById('detailed').innerHTML = `
        <div class="header"><div><h1>WIRELESS FREQUENCY CHART<span class="floor-badge">1ST FLOOR</span></h1><div class="subtitle">Clarion Hotel The Hub — Conference & Events</div></div><div class="note">All frequencies in MHz<br>Live from spreadsheet</div></div>
        <div class="cart-section"><div class="section-header">CART TRANSMITTERS<span class="system-badge badge-ewd">Sennheiser EW-D</span></div>
        <div class="cart-grid">${cartOrder.map(name => { const cart = f1.carts[name]; if(!cart) return ''; return `<div class="cart-box ${cartColors[name]}"><h3>${name}</h3><div class="transmitters">${cart.map(t=>`<div class="tx"><div class="tx-label">${t.tx}</div><div class="tx-freq">${t.freq}</div></div>`).join('')}</div></div>`; }).join('')}</div></div>
        <div class="two-col"><div><div class="col-header"><div class="section-header orange">PORTABLE RACKS<span class="system-badge badge-g4">Sennheiser ew G4</span></div></div><div class="info-box orange-bg">${f1.portableRacks.map(r=>`<div class="info-row"><span class="label">${r.name}</span><span class="freq">${r.freq} MHz</span></div>`).join('')}</div></div>
        <div><div class="col-header"><div class="section-header teal">TECH ROOM<span class="system-badge badge-g4">Sennheiser ew G4</span></div></div><div class="info-box teal-bg">${f1.techRoom.map(t=>`<div class="info-row"><span class="label">${t.name}</span><span class="freq">${t.freq} MHz</span></div>`).join('')}</div></div></div>
        <div class="band-section"><div class="section-header gray">FREQUENCY BANDS AT A GLANCE</div><div class="band-grid">
        <div class="band-box blue"><h4>CART SYSTEMS</h4><div class="range">${br.carts.min} – ${br.carts.max} MHz</div><div class="desc">Carts 1–7 + Midas (${br.carts.count} ch)</div></div>
        <div class="band-box orange"><h4>PORTABLE RACKS</h4><div class="range">${br.portableRacks.min} – ${br.portableRacks.max} MHz</div><div class="desc">${br.portableRacks.count} channels</div></div>
        <div class="band-box teal"><h4>TECH ROOM</h4><div class="range">${br.techRoom.min} – ${br.techRoom.max} MHz</div><div class="desc">${br.techRoom.count} channels</div></div>
        </div></div><div class="footer">Rev. ${now} — Data live from Google Sheets</div>`;

    document.getElementById('quick').innerHTML = `
        <div class="quick-ref-header"><h1>1ST FLOOR — FREQUENCIES IN USE</h1><div class="subtitle">Clarion Hotel The Hub — Avoid these frequencies when coordinating</div></div>
        <div class="freq-columns"><div class="freq-column"><h3>EW-D Systems (${qr1.ewd.length} ch)</h3><div class="system-note">Carts 1–7 + Midas Cart</div><ul class="freq-list">${qr1.ewd.map(f=>`<li>${f} MHz</li>`).join('')}</ul></div>
        <div class="freq-column"><h3>ew G4 Systems (${qr1.g4.length} ch)</h3><div class="system-note">Portable Racks + Tech Room</div><ul class="freq-list">${qr1.g4.map(f=>`<li>${f} MHz</li>`).join('')}</ul></div></div>
        <div class="footer">Rev. ${now}</div>`;

    document.getElementById('detailed2f').innerHTML = `
        <div class="header" style="background:#065f46;"><div><h1>WIRELESS FREQUENCY CHART<span class="floor-badge" style="background:#10b981;">2ND FLOOR</span></h1><div class="subtitle">Jernbanetorget</div></div><div class="note">All frequencies in MHz<br>Live from spreadsheet</div></div>
        <div class="cart-section"><div class="section-header" style="background:#065f46;">JERNBANETORGET TRANSMITTERS<span class="system-badge badge-ewd">Sennheiser EW-DX</span></div>
        <div class="floor-2f-row">${groupOrder.map(name => { const group = f2.groups[name]; if(!group) return ''; return `<div class="floor-2f-box"><h3>${name}</h3><div class="transmitters">${group.map(t=>`<div class="tx"><div class="tx-label">${t.tx}</div><div class="tx-freq">${t.freq}</div></div>`).join('')}</div></div>`; }).join('')}</div></div>
        <div class="band-section"><div class="section-header gray">FREQUENCY BAND</div><div class="band-box blue" style="max-width:250px;"><h4>JERNBANETORGET</h4><div class="range">${br.floor2.min} – ${br.floor2.max} MHz</div><div class="desc">${br.floor2.count} channels — EW-DX</div></div></div>
        <div class="footer">Rev. ${now}</div>`;

    const half = Math.ceil(qr2.length / 2);
    document.getElementById('quick2f').innerHTML = `
        <div class="quick-ref-header" style="background:#065f46;"><h1>2ND FLOOR — FREQUENCIES IN USE</h1><div class="subtitle">Jernbanetorget — Avoid these frequencies when coordinating</div></div>
        <div class="freq-columns"><div class="freq-column"><h3 style="border-color:#065f46;">EW-DX System (1–${half})</h3><div class="system-note">Jernbanetorget</div><ul class="freq-list">${qr2.slice(0,half).map(f=>`<li>${f} MHz</li>`).join('')}</ul></div>
        <div class="freq-column"><h3 style="border-color:#065f46;">EW-DX System (${half+1}–${qr2.length})</h3><div class="system-note">Jernbanetorget</div><ul class="freq-list">${qr2.slice(half).map(f=>`<li>${f} MHz</li>`).join('')}</ul></div></div>
        <div class="footer">Rev. ${now}</div>`;
}

function showTab(btn, tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
}

Promise.all([fetchSheet('1F Detailed'), fetchSheet('2F Detailed')])
    .then(([j1, j2]) => render(parse1F(j1), parse2F(j2)))
    .catch(err => {
        document.getElementById('detailed').innerHTML = `<div class="error">Failed to load frequency data: ${err.message}<br><br>Check internet connection or <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}">open spreadsheet directly</a></div>`;
    });
</script>
</body>
</html>
