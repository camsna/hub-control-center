networks:
  hub-control:
    driver: bridge

volumes:
  lighting-data:
  mx6000-backups:

services:
  lighting-controller:
    build: ./services/lighting-controller
    container_name: lighting-controller
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - lighting-data:/app/data
    environment:
      - PORT=8081
      - LUMINEX_IP=10.0.80.98
      - CUECORE_A_IP=10.0.80.81
      - CUECORE_B_IP=10.0.80.82
      - CUECORE_C_IP=10.0.80.83
      - CRESTRON_IP=10.0.80.71
      - CRESTRON_PORT=41794
    networks:
      - hub-control

  mx6000-control:
    build: ./services/mx6000-control
    container_name: mx6000-control
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - mx6000-backups:/backups
    environment:
      - MX6000_IP=10.0.81.207
      - MX6000_PORT=8001
      - PORT=3000
    networks:
      - hub-control

  hub-proxy:
    image: nginx:alpine
    container_name: hub-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - mx6000-control
      - hub-tools
      - hub-docs
      - lighting-controller
      - chandelier-controller
    networks:
      - hub-control

  hub-tools:
    build: ./hub-tools
    container_name: hub-tools
    restart: unless-stopped
    networks:
      - hub-control

  hub-docs:
    image: nginx:alpine
    container_name: hub-docs
    restart: unless-stopped
    volumes:
      - ./docs:/usr/share/nginx/html:ro
    networks:
      - hub-control


  mx6000-backup:
    image: python:3.12-alpine
    container_name: mx6000-backup
    restart: "no"
    volumes:
      - ./mx6000-backup.py:/backup.py:ro
      - mx6000-backups:/backups
    entrypoint: ["python3", "/backup.py"]
    networks:
      - hub-control

  schedule-web:
    build:
      context: ./services/schedule
      dockerfile: Dockerfile.web
    container_name: schedule-web
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./services/schedule/data:/app/data
    environment:
      - PORT=8090
      - TZ=Europe/Oslo
    networks:
      - hub-control

  schedule-scraper:
    build:
      context: ./services/schedule
      dockerfile: Dockerfile.scraper
    container_name: schedule-scraper
    restart: unless-stopped
    volumes:
      - ./services/schedule/data:/app/data
    environment:
      - TZ=Europe/Oslo
    networks:
      - hub-control

  crestron-central:
    build: ./services/crestron-central
    container_name: crestron-central
    restart: unless-stopped
    expose:
      - "8080"
      - "8765"
    networks:
      - hub-control

  direct-control:
    build: ./services/direct-control
    container_name: direct-control
    restart: unless-stopped
    expose:
      - "8090"
      - "8091"
    networks:
      - hub-control

  chandelier-controller:
    build: ./services/chandelier-controller
    container_name: chandelier-controller
    restart: unless-stopped
    expose:
      - "8070"
      - "8071"
    environment:
      - PLC_IP=100.92.43.22
      - AMS_NET_ID=192.168.2.5.1.1
      - HTTP_PORT=8070
      - WS_PORT=8071
      - POLL_INTERVAL=0.5
    networks:
      - hub-control
