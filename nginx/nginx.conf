worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Upstreams
    upstream mx6000      { server mx6000-control:3000; }
    upstream hub-tools   { server hub-tools:80; }
    upstream docs        { server hub-docs:80; }
    upstream lighting    { server lighting-controller:8081; }
    upstream schedule    { server schedule-web:8090; }
    upstream crestron    { server crestron-central:8080; }
    upstream crestron-ws { server crestron-central:8765; }
    upstream direct      { server direct-control:8090; }
    upstream direct-ws   { server direct-control:8091; }
    upstream chandelier    { server chandelier-controller:8070; }
    upstream chandelier-ws { server chandelier-controller:8071; }

    # =====================================================
    # Subdomain servers
    # =====================================================

    # Lighting controller: lighting.tech.thehub
    server {
        listen 80;
        server_name lighting.tech.thehub;
        location / {
            proxy_pass http://lighting;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # LED wall: mx6000.tech.thehub / ledwall.tech.thehub
    server {
        listen 80;
        server_name mx6000.tech.thehub ledwall.tech.thehub;
        location / {
            proxy_pass http://mx6000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Schedule: schedule.tech.thehub (PASSWORD PROTECTED)
    server {
        listen 80;
        server_name schedule.tech.thehub;
        location / {
            proxy_pass http://schedule;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Reference tools: tools.tech.thehub
    server {
        listen 80;
        server_name tools.tech.thehub;
        location / {
            proxy_pass http://hub-tools;
        }
    }

    # Documentation: docs.tech.thehub
    server {
        listen 80;
        server_name docs.tech.thehub;
        location / {
            proxy_pass http://docs;
        }
    }

    # Chandelier controller: chandelier.tech.thehub
    server {
        listen 80;
        server_name chandelier.tech.thehub;
        location = /ws {
            proxy_pass http://chandelier-ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
        location / {
            proxy_pass http://chandelier;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Admin: admin.tech.thehub redirects to /admin.html on default server
    server {
        listen 80;
        server_name admin.tech.thehub;
        return 301 $scheme://tech.thehub/admin.html;
    }

    # =====================================================
    # Main server: tech.thehub + IP access (default)
    # =====================================================
    server {
        listen 80 default_server;
        server_name tech.thehub;

        root /usr/share/nginx/html;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        location = /admin.html {
            auth_basic "Hub Tech Internal";
            auth_basic_user_file /etc/nginx/htpasswd;
            try_files /admin.html =404;
        }

        # Lighting controller
        location /lighting/ {
            rewrite ^/lighting/(.*) /$1 break;
            proxy_pass http://lighting;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location = /lighting { return 301 /lighting/; }

        # LED wall — served at /mx6000/ with sub_filter to fix API paths
        location /mx6000/ {
            rewrite ^/mx6000/(.*) /$1 break;
            proxy_pass http://mx6000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter_types text/html application/javascript;
            sub_filter "fetch('/api/" "fetch('/mx6000/api/";
            sub_filter "'/api/" "'/mx6000/api/";
        }
        location = /mx6000 { return 301 /mx6000/; }

        # Schedule — served at /schedule/ with sub_filter to fix API paths
        location /schedule/ {
            rewrite ^/schedule/(.*) /$1 break;
            proxy_pass http://schedule;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter_types text/html application/javascript;
            sub_filter "'/api/" "'/schedule/api/";
            sub_filter '"/api/' '"/schedule/api/';
        }
        location = /schedule { return 301 /schedule/; }

        # Reference tools
        location /tools/ {
            rewrite ^/tools/(.*) /$1 break;
            proxy_pass http://hub-tools;
        }
        location = /tools { return 301 /tools/; }

        # Documentation
        location /docs/ {
            rewrite ^/docs/(.*) /$1 break;
            proxy_pass http://docs;
        }
        location = /docs { return 301 /docs/; }

        # Portainer (PASSWORD PROTECTED)
        location /portainer/ {
            auth_basic "Hub Tech Admin";
            auth_basic_user_file /etc/nginx/htpasswd;
            proxy_pass http://portainer:9000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
        location = /portainer { return 301 /portainer/; }

        # Crestron Central (CIP controllers)
        location /crestron/ {
            rewrite ^/crestron/(.*) /$1 break;
            proxy_pass http://crestron;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location = /crestron { return 301 /crestron/; }
        location /crestron/ws {
            rewrite ^/crestron/ws /ws break;
            proxy_pass http://crestron-ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Direct Control POC
        location /direct/ {
            rewrite ^/direct/(.*) /$1 break;
            proxy_pass http://direct;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location = /direct { return 301 /direct/; }
        location /direct/ws {
            rewrite ^/direct/ws /ws break;
            proxy_pass http://direct-ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }
}
