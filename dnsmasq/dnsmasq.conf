# Hub Tech DNS Server
# Resolves *.hub to Mac Studio, forwards everything else

# Don't read /etc/resolv.conf
no-resolv

# Don't read /etc/hosts  
no-hosts

# Listen on all interfaces
interface=*

# Upstream DNS (Google)
server=8.8.8.8
server=8.8.4.4

# Resolve ALL .hub domains to Mac Studio
address=/hub/10.0.81.231

# Cache size
cache-size=1000
